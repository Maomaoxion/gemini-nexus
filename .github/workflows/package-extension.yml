name: Package Extension

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gemini-nexus

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gemini-nexus/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build extension bundle
        run: npm run package:extension

      - name: Resolve version
        id: version
        run: echo "value=$(node -p \"JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version\")" >> "$GITHUB_OUTPUT"

      - name: Create zip artifact
        run: |
          mkdir -p artifacts
          cd artifacts/chrome-extension
          zip -r "../gemini-nexus-v${{ steps.version.outputs.value }}.zip" .

      - name: Upload packaged extension
        uses: actions/upload-artifact@v4
        with:
          name: gemini-nexus-v${{ steps.version.outputs.value }}
          path: gemini-nexus/artifacts/gemini-nexus-v${{ steps.version.outputs.value }}.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: gemini-nexus/artifacts/gemini-nexus-v${{ steps.version.outputs.value }}.zip
          generate_release_notes: true
